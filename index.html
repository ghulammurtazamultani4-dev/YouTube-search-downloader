<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SkillForge – Free Student Tools</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
:root{
--bg:#0f172a;
--card:#020617;
--main:#2563eb;
}
body{margin:0;font-family:Segoe UI,Arial;background:var(--bg);color:#fff}
header{
display:flex;align-items:center;gap:10px;
padding:12px 16px;background:#020617;font-size:18px;font-weight:600
}
.logo{
width:36px;height:36px;border-radius:8px;
background:linear-gradient(135deg,#3b82f6,#06b6d4);
display:flex;align-items:center;justify-content:center;
font-weight:bold
}

nav{display:flex;background:#020617}
nav button{flex:1;padding:12px;border:0;background:#020617;color:#fff}
nav button.active{background:var(--main)}

section{display:none;padding:14px}
.card{background:var(--card);border-radius:12px;padding:12px;margin-bottom:14px}
input,textarea,select{
width:100%;padding:10px;border-radius:6px;border:0;margin:6px 0
}
button{
padding:10px 14px;border:0;border-radius:6px;
background:var(--main);color:#fff
}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
#cvPreview{
background:#fff;color:#000;border-radius:8px;padding:12px
}

.cv-template-2 h2{color:#2563eb}
.cv-template-2{border-left:6px solid #2563eb;padding-left:10px}

canvas{max-width:100%;border-radius:10px;background:#000}
.badge{font-size:12px;color:#93c5fd}
</style>
</head>
<body>

<header>
<div class="logo">SF</div>
<div>
SkillForge Tools
<div class="badge">Resume • Thumbnail • PDF</div>
</div>
</header>

<nav>
<button id="t1" class="active" onclick="showTab(1)">Resume</button>
<button id="t2" onclick="showTab(2)">Thumbnail</button>
<button id="t3" onclick="showTab(3)">PDF</button>
</nav>

<!-- ================= Resume ================= -->

<section id="tab1" style="display:block">

<div class="card">
<h3>Resume Template</h3>
<select id="cvTemplate" onchange="updateCV()">
<option value="1">Classic Resume</option>
<option value="2">Modern Resume</option>
</select>
</div>

<div class="card">
<div class="grid">
<input id="name" placeholder="Full Name">
<input id="email" placeholder="Email">
</div>
<textarea id="skills" placeholder="Skills"></textarea>
<textarea id="education" placeholder="Education"></textarea>

<button onclick="updateCV()">Preview</button>
<button onclick="downloadCV()">Download PDF</button>
</div>

<div class="card">
<div id="cvPreview">
<h2 id="pName">Your Name</h2>
<p id="pEmail"></p>
<h4>Skills</h4>
<p id="pSkills"></p>
<h4>Education</h4>
<p id="pEdu"></p>
</div>
</div>

</section>

<!-- ================= Thumbnail ================= -->

<section id="tab2">

<div class="card">
<h3>Thumbnail Style</h3>
<select id="thumbStyle">
<option value="1">YouTube Bold</option>
<option value="2">Clean Minimal</option>
</select>
</div>

<div class="card">
<input type="file" accept="image/*" onchange="loadImage(event)">
<input id="thumbText" placeholder="Main text">
<button onclick="drawThumb()">Apply Template</button>
<button onclick="downloadThumb()">Download PNG</button>
<br><br>
<canvas id="canvas" width="640" height="360"></canvas>
</div>

</section>

<!-- ================= PDF ================= -->

<section id="tab3">
<div class="card">
<h3>Images to PDF</h3>
<input type="file" multiple accept="image/*" id="imgPdf">
<button onclick="imagesToPDF()">Convert to PDF</button>
<p class="badge">All work is done inside your browser</p>
</div>
</section>

<script>
function showTab(n){
document.querySelectorAll("section").forEach(s=>s.style.display="none");
document.getElementById("tab"+n).style.display="block";
document.querySelectorAll("nav button").forEach(b=>b.classList.remove("active"));
document.getElementById("t"+n).classList.add("active");
}

/* ---------------- Resume ---------------- */

function updateCV(){

const preview=document.getElementById("cvPreview");
const t=cvTemplate.value;

preview.className="";
if(t==="2") preview.classList.add("cv-template-2");

pName.innerText=name.value||"Your Name";
pEmail.innerText=email.value;
pSkills.innerText=skills.value;
pEdu.innerText=education.value;
}

async function downloadCV(){
updateCV();
const { jsPDF } = window.jspdf;
const doc=new jsPDF();
doc.text(pName.innerText,10,10);
doc.text(pEmail.innerText,10,18);
doc.text("Skills:",10,30);
doc.text(pSkills.innerText,10,38);
doc.text("Education:",10,60);
doc.text(pEdu.innerText,10,68);
doc.save("resume.pdf");
}

/* ---------------- Thumbnail ---------------- */

const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");
let baseImg=null;

function loadImage(e){
const img=new Image();
img.onload=function(){
baseImg=img;
canvas.width=img.width;
canvas.height=img.height;
ctx.drawImage(img,0,0);
}
img.src=URL.createObjectURL(e.target.files[0]);
}

function drawThumb(){
if(!baseImg)return;

ctx.drawImage(baseImg,0,0);

const style=thumbStyle.value;
const text=thumbText.value;

if(style==="1"){
ctx.fillStyle="rgba(0,0,0,0.55)";
ctx.fillRect(0,canvas.height-120,canvas.width,120);
ctx.fillStyle="#fff";
ctx.font="bold 48px Arial";
ctx.textAlign="center";
ctx.fillText(text,canvas.width/2,canvas.height-40);
}
else{
ctx.fillStyle="rgba(255,255,255,0.85)";
ctx.fillRect(20,20,canvas.width-40,90);
ctx.fillStyle="#000";
ctx.font="bold 36px Arial";
ctx.textAlign="center";
ctx.fillText(text,canvas.width/2,80);
}
}

function downloadThumb(){
const a=document.createElement("a");
a.download="thumbnail.png";
a.href=canvas.toDataURL("image/png");
a.click();
}

/* ---------------- Images to PDF ---------------- */

async function imagesToPDF(){
const files=imgPdf.files;
if(!files.length)return;

const { jsPDF } = window.jspdf;
const doc=new jsPDF();

for(let i=0;i<files.length;i++){
const data=await fileToDataURL(files[i]);
const img=new Image();
await new Promise(r=>{img.onload=r;img.src=data});
const w=doc.internal.pageSize.getWidth();
const h=img.height*w/img.width;
if(i>0)doc.addPage();
doc.addImage(img,"JPEG",0,0,w,h);
}
doc.save("images.pdf");
}

function fileToDataURL(file){
return new Promise(res=>{
const r=new FileReader();
r.onload=e=>res(e.target.result);
r.readAsDataURL(file);
});
}
</script>

</body>
</html>
