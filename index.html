<script>
function quick(q){
    document.getElementById("q").value = q;
    search();
}

async function search(){

    const query = document.getElementById("q").value.trim();
    if(!query) return;

    // words ko alag alag karna
    const words = query.split(/\s+/).filter(w => w.length > 1);

    // title based flexible query
    let titleQuery = words.map(w => `title:(${w}*)`).join(" OR ");

    const api =
      "https://archive.org/advancedsearch.php?q="
      + encodeURIComponent("(" + titleQuery + ") AND mediatype:(movies)")
      + "&fl[]=identifier&fl[]=title"
      + "&rows=20&page=1&output=json";

    const res = await fetch(api);
    const data = await res.json();

    const list = data.response.docs;
    const box = document.getElementById("results");
    box.innerHTML = "";

    if(!list.length){
        box.innerHTML = "<p>No similar video found.</p>";
        return;
    }

    list.forEach(v=>{

        const thumb = "https://archive.org/services/img/" + v.identifier;
        const watch = "https://archive.org/embed/" + v.identifier;
        const details = "https://archive.org/details/" + v.identifier;

        const div = document.createElement("div");
        div.className="card";

        div.innerHTML = `
            <img class="thumb" src="${thumb}">
            <div class="info">
                <h4>${v.title || "No title"}</h4>
                <div class="actions">
                    <a href="#" onclick="openPlayer('${watch}');return false;">Play</a>
                    <a href="${details}" target="_blank">Download</a>
                </div>
            </div>
        `;

        box.appendChild(div);
    });

}

function openPlayer(url){
    const box = document.getElementById("playerBox");
    const frame = document.getElementById("playerFrame");
    frame.src = url;
    box.style.display="flex";
}

function closePlayer(){
    const box = document.getElementById("playerBox");
    const frame = document.getElementById("playerFrame");
    frame.src="";
    box.style.display="none";
}
</script>
